<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Voters Database Portal</title>

<style>

:root{
--apc-green:#008751;
--apc-green-dark:#006b40;
--white:#ffffff;
--text-light:rgba(255,255,255,0.95);
--text-soft:rgba(255,255,255,0.9);
--shadow:0 12px 30px rgba(0,0,0,0.18);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, sans-serif;
background:var(--apc-green);
color:white;
overflow-x:hidden;
}

/* Leaders */

.leaders{
position:fixed;
inset:0;
z-index:0;
pointer-events:none;
}

.leaders img{
position:absolute;
bottom:0;
height:92vh;
object-fit:contain;
opacity:0.7;
}

.shettima{
left:-255px;
}

.tinubu{
right:-250px;
}

/* Green Overlay */

.bg-overlay{
position:fixed;
inset:0;
z-index:1;

background:linear-gradient(
to bottom,
rgba(0,135,81,0.65) 0%,
rgba(0,135,81,0.65) 60%,
rgba(0,135,81,0.45) 75%,
rgba(255,255,255,0.95) 92%,
rgba(255,255,255,1) 100%
);
}

/* Nigeria Map */

.map-layer{
position:fixed;
inset:0;
z-index:2;
display:flex;
justify-content:center;
align-items:center;
pointer-events:none;
opacity:0.25;
}

.map-layer img{
width:900px;
max-width:90%;
}

/* Page Layout */

.page{
position:relative;
z-index:3;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* Navbar */

.navbar{
background:rgba(0,98,58,0.92);
backdrop-filter:blur(4px);
padding:14px 32px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:var(--shadow);
}

.brand{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:white;
}

.brand img{
width:42px;
height:42px;
border-radius:50%;
background:white;
}

.brand span{
font-size:1.6rem;
font-weight:700;
}

.nav-links{
display:flex;
gap:28px;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:600;
}

.nav-links a:hover{
opacity:0.8;
}

/* Hero */

.hero{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:40px 28px 120px;
}

.hero-inner{
width:1100px;
max-width:100%;
display:grid;
grid-template-columns:1.2fr 0.8fr;
gap:60px;
align-items:center;
}

/* Left */

.hero-left h1{
font-size:4rem;
line-height:0.95;
font-weight:900;
letter-spacing:-1px;
margin-bottom:18px;
}

.hero-left h1 span{
display:block;
}

.hero-left p{
font-size:1.15rem;
line-height:1.4;
color:var(--text-soft);
margin-bottom:28px;
max-width:600px;
}

.hero-buttons{
display:flex;
gap:18px;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:16px 34px;
font-weight:800;
border-radius:4px;
text-decoration:none;
cursor:pointer;
transition:0.2s;
}

.btn-login{
background:white;
color:var(--apc-green-dark);
box-shadow:var(--shadow);
}

.btn-login span{
margin-left:10px;
}

.btn:hover{
transform:translateY(-2px);
}

/* Right Section */

.hero-right{
display:flex;
justify-content:flex-start;
}

.secure-box{
max-width:380px;
}

.secure-box h3{
font-size:2rem;
margin-bottom:10px;
}

.secure-box p{
font-size:1.15rem;
line-height:1.45;
color:var(--text-soft);
}

/* Mobile */

@media(max-width:900px){

.hero-inner{
grid-template-columns:1fr;
gap:30px;
}

.hero-left h1{
font-size:3.5rem;
}

.leaders img{
position:absolute;
bottom:0;
height:92vh;
object-fit:contain;
opacity:0.95;

/* cinematic fade effect */
mask-image: linear-gradient(to center, black 80%, transparent 100%);
-webkit-mask-image: linear-gradient(to center, black 80%, transparent 100%);
}

   .shettima{
        left:-70px;
      }

      .tinubu{
        right:-70px;
      }
    }

@media(max-width:600px){

.navbar{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.hero-left h1{
font-size:2.6rem;
}

.btn-login{
width:100%;
max-width:200px;
}

}

</style>
</head>

<body>

<!-- Leaders -->

<div class="leaders">
<img src="images/shettima.png" class="shettima" alt="Shettima"/>
<img src="images/tinubu.png" class="tinubu" alt="Tinubu"/>
</div>

<!-- Green Overlay -->

<div class="bg-overlay"></div>

<!-- Nigeria Map -->

<div class="map-layer">
<img src="images/nigeria-map.png" alt="Nigeria Map"/>
</div>

<div class="page">

<header class="navbar">

<a href="/" class="brand">
<img src="images/apc-logo.png" alt="APC Logo"/>
<span>Database Portal</span>
</a>

<nav class="nav-links">
<a href="/">Home</a>
<a href="/login">Login</a>
</nav>

</header>

<main class="hero">

<div class="hero-inner">

<div class="hero-left">

<h1>
VOTERS<br>
<span>DATABASE PORTAL</span>
</h1>

<p>
Harmonized Data base of APC Members, Support groups and Voters
</p>

<div class="hero-buttons">
<a href="/login" class="btn btn-login">
Login <span>→</span>
</a>
</div>

</div>

<div class="hero-right">

<div class="secure-box">

<h3>Secure Access</h3>

<p>
Only authorized users can login to view or search the database by State, Local Government or Ward.
</p>

</div>

</div>

</div>

</main>

</div>

</body>
</html>
