<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authenticator - Voters Database Portal</title>

  <style>
    :root{
      --apc-green:#008751;
      --apc-dark:#006b40;
      --apc-deep:#005f39;
      --white:#ffffff;
      --text-light:rgba(255,255,255,0.95);
      --text-soft:rgba(255,255,255,0.90);
      --shadow:0 14px 36px rgba(0,0,0,0.18);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    html, body{
      min-height:100%;
      overflow-x:hidden;
      background:var(--apc-green);
    }

    body{
      min-height:100vh;
      color:var(--white);
      position:relative;
    }

    /* Leaders images */
    .leaders{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
    }

    .leaders img{
      position:absolute;
      bottom:0;
      height:92vh;
      max-height:96%;
      object-fit:contain;
      opacity:0.7;
    }

    .shettima{
      left:-255px;
    }

    .tinubu{
      right:-255px;
    }

    /* Green overlay */
    .overlay{
      position:fixed;
      inset:0;
      z-index:1;
      background:
        linear-gradient(
          to bottom,
          rgba(0,135,81,0.80) 0%,
          rgba(0,135,81,0.80) 58%,
          rgba(0,135,81,0.62) 76%,
          rgba(255,255,255,0.94) 92%,
          rgba(255,255,255,1) 100%
        );
    }

    /* Nigeria map */
    .map-layer{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:2;
      pointer-events:none;
      opacity:0.18;
    }

    .map-layer img{
      width:min(820px, 88vw);
      max-width:92%;
      object-fit:contain;
      filter:brightness(0.35);
    }

    /* Main page */
    .page{
      position:relative;
      z-index:3;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* Navbar */
    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 30px;
      background:rgba(0,98,58,0.92);
      backdrop-filter:blur(4px);
      box-shadow:0 8px 24px rgba(0,0,0,0.14);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
      color:var(--white);
      font-weight:700;
      font-size:1.45rem;
    }

    .brand img{
      width:42px;
      height:42px;
      border-radius:50%;
      background:#fff;
      object-fit:contain;
      padding:2px;
    }

    .nav-link{
      color:var(--white);
      text-decoration:none;
      font-weight:600;
      font-size:1rem;
    }

    .nav-link:hover{
      opacity:0.85;
    }

    /* Auth section */
    .auth-section{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px 120px;
    }

    .auth-inner{
      width:min(900px, 100%);
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .auth-box{
      width:100%;
      max-width:760px;
      padding:30px 20px;
    }

    .auth-box h1{
      font-size:clamp(1.5rem, 2.4vw, 2.35rem);
      font-weight:800;
      color:var(--text-light);
      margin-bottom:34px;
      line-height:1.3;
    }

    .code-inputs{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:14px;
      flex-wrap:nowrap;
      margin-bottom:26px;
    }

    .code-box{
      width:56px;
      height:64px;
      border:none;
      outline:none;
      background:#ffffff;
      border-radius:0;
      text-align:center;
      font-size:1.8rem;
      font-weight:700;
      color:#222;
      box-shadow:var(--shadow);
      caret-color:var(--apc-green);
    }

    .code-box:focus{
      box-shadow:0 0 0 3px rgba(255,255,255,0.25), 0 14px 30px rgba(0,0,0,0.18);
      transform:translateY(-1px);
    }

    .proceed-btn{
      border:none;
      background:rgba(0,95,57,0.95);
      color:#ffffff;
      padding:12px 30px;
      min-width:110px;
      border-radius:14px;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:background 0.2s ease, transform 0.15s ease;
    }

    .proceed-btn:hover{
      background:var(--apc-deep);
      transform:translateY(-1px);
    }

    .error-text{
      margin-top:14px;
      min-height:20px;
      font-size:0.95rem;
      color:#ffd7d7;
      font-weight:600;
    }

    @media (max-width: 900px){
      .leaders img{
        height:75vh;
        opacity:0.68;
      }

      .shettima{
        left:-100px;
      }

      .tinubu{
        right:-100px;
      }
    }

    @media (max-width: 700px){
      .navbar{
        padding:12px 16px;
      }

      .brand{
        font-size:1.1rem;
        gap:10px;
      }

      .brand img{
        width:36px;
        height:36px;
      }

      .auth-section{
        padding:36px 14px 110px;
      }

      .auth-box h1{
        font-size:1.25rem;
        margin-bottom:26px;
      }

      .code-inputs{
        gap:10px;
      }

      .code-box{
        width:44px;
        height:56px;
        font-size:1.5rem;
      }

      .leaders img{
        height:58vh;
        opacity:0.55;
      }

      .shettima{
        left:-70px;
      }

      .tinubu{
        right:-70px;
      }
    }

    @media (max-width: 480px){
      .code-inputs{
        gap:8px;
      }

      .code-box{
        width:40px;
        height:52px;
        font-size:1.3rem;
      }

      .proceed-btn{
        width:100%;
        max-width:180px;
      }
    }
  </style>
</head>
<body>
  <div class="leaders">
    <img src="images/shettima.png" alt="Shettima" class="shettima" />
    <img src="images/tinubu.png" alt="Tinubu" class="tinubu" />
  </div>

  <div class="overlay"></div>

  <div class="map-layer">
    <img src="images/nigeria-map.png" alt="Nigeria Map" />
  </div>

  <div class="page">
    <header class="navbar">
      <a href="/" class="brand">
        <img src="images/apc-logo.png" alt="APC Logo" />
        <span>Data Base Portal</span>
      </a>

      <a href="/" class="nav-link">Home</a>
    </header>

    <section class="auth-section">
      <div class="auth-inner">
        <div class="auth-box">
          <h1>Enter your Two-Factor Authentication Code to Proceed</h1>

          <div class="code-inputs" id="codeInputs">
            <input class="code-box" type="text" inputmode="numeric" maxlength="1" />
            <input class="code-box" type="text" inputmode="numeric" maxlength="1" />
            <input class="code-box" type="text" inputmode="numeric" maxlength="1" />
            <input class="code-box" type="text" inputmode="numeric" maxlength="1" />
            <input class="code-box" type="text" inputmode="numeric" maxlength="1" />
            <input class="code-box" type="text" inputmode="numeric" maxlength="1" />
          </div>

          <button class="proceed-btn" id="proceedBtn">Proceed</button>

          <div class="error-text" id="errorText"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const boxes = Array.from(document.querySelectorAll(".code-box"));
    const proceedBtn = document.getElementById("proceedBtn");
    const errorText = document.getElementById("errorText");
    const correctCode = "123456";

    boxes[0].focus();

    function getCode() {
      return boxes.map(box => box.value).join("");
    }

    function verifyCode() {
      errorText.textContent = "";
      const enteredCode = getCode();

      if (enteredCode.length !== 6) {
        errorText.textContent = "Please enter the 6-digit authentication code.";
        return;
      }

      if (enteredCode !== correctCode) {
        errorText.textContent = "Invalid authentication code.";
        return;
      }

      sessionStorage.setItem("authVerified", "true");
      window.location.href = "/dashboard";
    }

    boxes.forEach((box, index) => {
      box.addEventListener("input", (e) => {
        let value = e.target.value.replace(/\D/g, "");
        e.target.value = value;

        if (value && index < boxes.length - 1) {
          boxes[index + 1].focus();
        }

        if (getCode().length === 6) {
          errorText.textContent = "";
        }
      });

      box.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !box.value && index > 0) {
          boxes[index - 1].focus();
        }

        if (e.key === "Enter") {
          verifyCode();
        }
      });

      box.addEventListener("paste", (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData)
          .getData("text")
          .replace(/\D/g, "")
          .slice(0, 6);

        if (!pasted) return;

        boxes.forEach((input, i) => {
          input.value = pasted[i] || "";
        });

        const nextIndex = Math.min(pasted.length, 5);
        boxes[nextIndex].focus();
      });
    });

    proceedBtn.addEventListener("click", verifyCode);
  </script>
</body>
</html>
