<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <style>
      :root{
        --ng-green:#008751;
        --ng-green-dark:#006b40;
        --white:#ffffff;
        --bg:#f4fff9;
        --text:#0d1412;
        --muted:#66756f;
        --border: rgba(0,0,0,.12);
      }

      *{
        box-sizing:border-box;
      }

      body{
        font-family: Arial, sans-serif;
        background: var(--bg);
        padding: 0;
        margin: 0;
        color: var(--text);
      }

      .topbar{
        background: linear-gradient(135deg, var(--ng-green-dark), var(--ng-green));
        color: var(--white);
        padding: 16px 20px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        position: sticky;
        top: 0;
        z-index: 10;
        box-shadow: 0 10px 20px rgba(0,0,0,.10);
      }

      .topbar .title{
        font-weight: 900;
        letter-spacing:.3px;
      }

      .topbar a{
        color: rgba(255,255,255,.95);
        font-weight: 700;
        text-decoration: none;
      }

      .container{
        padding: 20px;
        width: min(1400px, 100%);
        margin: 0 auto;
      }

      .top{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
        margin-bottom:12px;
        align-items:center;
      }

      input, button, select{
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        box-sizing: border-box;
        font-size: 14px;
      }

      input:focus, select:focus{
        outline: 2px solid rgba(0,135,81,.22);
        border-color: rgba(0,135,81,.35);
      }

      button{
        background: var(--ng-green);
        color: var(--white);
        border: none;
        cursor: pointer;
        font-weight: 800;
      }

      button:hover{
        background: var(--ng-green-dark);
      }

      button:disabled{
        opacity: .55;
        cursor:not-allowed;
      }

      .btn-secondary{
        background: #ffffff;
        color: var(--ng-green-dark);
        border: 1px solid rgba(0,0,0,.15);
        font-weight: 900;
      }

      .btn-secondary:hover{
        background: rgba(255,255,255,.85);
      }

      .logout{
        margin-left:auto;
        background:#ffffff;
        color:#006b40;
        border: 1px solid rgba(255,255,255,.7);
        font-weight: 900;
      }

      .logout:hover{
        background: rgba(255,255,255,.85);
      }

      .meta{
        margin: 10px 0;
        color: #1c2a24;
        font-weight: 700;
      }

      .errorBox{
        background: #fff;
        border-radius: 14px;
        padding: 12px;
        margin-bottom: 12px;
        color: #b00020;
        border: 1px solid rgba(176,0,32,.18);
        display: none;
      }

      .tableWrap{
        width: 100%;
        overflow-x: auto;
      }

      table{
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 12px 24px rgba(0,0,0,.06);
      }

      th, td{
        padding: 12px;
        border-bottom: 1px solid #eee;
        text-align: left;
        vertical-align: top;
        white-space: nowrap;
      }

      th{
        background: rgba(0,135,81,.07);
        color: var(--ng-green-dark);
        font-weight: 900;
      }

      .actions{
        display:flex;
        gap:6px;
        flex-wrap:wrap;
      }

      .btn-small{
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 800;
      }

      .btn-edit{
        background:#0f766e;
      }

      .btn-edit:hover{
        background:#0b5f58;
      }

      .btn-danger{
        background:#b00020;
      }

      .btn-danger:hover{
        background:#8f001a;
      }

      .modalBack{
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.45);
        display: none;
        align-items:center;
        justify-content:center;
        padding: 20px;
        z-index: 999;
      }

      .modal{
        width: min(820px, 100%);
        background: #fff;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,.25);
      }

      .modalHeader{
        padding: 14px 16px;
        background: rgba(0,135,81,.07);
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
      }

      .modalHeader h3{
        margin: 0;
        color: var(--ng-green-dark);
        font-weight: 900;
      }

      .modalBody{
        padding: 16px;
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .modalBody .full{
        grid-column: 1 / -1;
      }

      .hint{
        color: var(--muted);
        font-size: 12px;
        margin-top: -6px;
      }

      .modalFooter{
        padding: 14px 16px;
        display:flex;
        gap:10px;
        justify-content:flex-end;
        border-top: 1px solid rgba(0,0,0,.08);
      }

      .closeX{
        cursor:pointer;
        font-weight: 900;
        color: var(--ng-green-dark);
        user-select:none;
      }

      @media (max-width: 768px){
        .topbar{
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
        }

        .container{
          padding: 14px;
        }

        .top{
          flex-direction: column;
          align-items: stretch;
        }

        .top input,
        .top button,
        .top select{
          width: 100%;
        }

        .logout{
          margin-left: 0;
        }

        table,
        thead,
        tbody,
        th,
        td,
        tr{
          display: block;
          width: 100%;
        }

        thead{
          display: none;
        }

        tbody tr{
          background: #fff;
          border: 1px solid rgba(0,0,0,.08);
          border-radius: 14px;
          box-shadow: 0 8px 18px rgba(0,0,0,.05);
          margin-bottom: 14px;
          padding: 10px;
        }

        td{
          border: none;
          border-bottom: 1px solid #f0f0f0;
          padding: 10px 8px 10px 46%;
          position: relative;
          min-height: 22px;
          text-align: left;
          word-break: break-word;
          white-space: normal;
        }

        td:last-child{
          border-bottom: none;
        }

        td::before{
          content: attr(data-label);
          position: absolute;
          left: 8px;
          top: 10px;
          width: 40%;
          font-weight: 900;
          color: var(--ng-green-dark);
        }

        .actions{
          display:flex;
          gap:6px;
          justify-content:flex-start;
          flex-wrap:nowrap;
        }

        .btn-small{
          padding: 5px 8px;
          font-size: 12px;
          border-radius: 6px;
          width: auto;
          flex: 0 0 auto;
        }

        .modal{
          width: 100%;
        }

        .modalBody{
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="topbar">
      <div class="title">Database Portal • Search Records</div>
      <a href="/">Home</a>
    </div>

    <div class="container">
      <div class="top">
        <input id="state" placeholder="State (e.g. Lagos)" />
        <input id="lga" placeholder="LGA (e.g. Ikeja)" />
        <button id="searchBtn">Search</button>
        <button class="btn-secondary" id="addBtn">+ Add Record</button>
        <button class="logout" id="logoutBtn">Logout</button>
      </div>

      <div class="top" style="margin-top:10px;">
        <button class="btn-secondary" id="prevBtn">← Prev</button>
        <button class="btn-secondary" id="nextBtn">Next →</button>

        <span style="font-weight:800;">Page:</span>
        <span id="pageLabel">1</span>

        <span style="font-weight:800;margin-left:10px;">Per page:</span>
        <select id="limitSel">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>

        <button id="usersBtn" class="btn-secondary" style="display:none;margin-left:auto;">Users</button>
      </div>

      <div class="errorBox" id="errorBox"></div>
      <div class="meta" id="meta"></div>

      <div class="tableWrap">
        <table>
          <thead>
            <thead>
<tr>
<th>S/N</th>
<th>Name</th>
<th>Phone</th>
<th>State</th>
<th>LGA</th>
<th>Ward</th>
<th>Polling Unit</th>
<th>PVC/VIN</th>
<th>Position</th>
<th>Age</th>
<th>Gender</th>
<th>Support Group</th>
<th>Actions</th>
</tr>
</thead>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="modalBack" id="modalBack">
      <div class="modal">
        <div class="modalHeader">
          <h3 id="modalTitle">Add Record</h3>
          <div class="closeX" id="closeModal">✕</div>
        </div>

        <div class="modalBody">
          <div class="full">
            <input id="m_full_name" placeholder="Full Name" />
          </div>

          <div>
            <input id="m_phone" placeholder="Phone (e.g. 080...)" />
            <div class="hint">Numbers only (preferred)</div>
          </div>

          <div>
            <input id="m_state" placeholder="State" />
          </div>

          <div>
            <input id="m_lga" placeholder="LGA" />
          </div>

          <div>
            <input id="m_ward" placeholder="Ward (e.g. Ward 01)" />
          </div>

          <div>
            <input id="m_polling_unit" placeholder="Polling Unit" />
          </div>

          <div>
            <input id="m_pvc_vin" placeholder="PVC/VIN" />
          </div>

          <div>
            <input id="m_position" placeholder="Position" />
          </div>

          <div>
            <input id="m_age" placeholder="Age" />
          </div>

          <div>
            <input id="m_gender" placeholder="Gender" />
          </div>

          <div class="full">
            <input id="m_support_group" placeholder="Support Group" />
          </div>
        </div>

        <div class="modalFooter">
          <button class="btn-secondary" id="cancelModal">Cancel</button>
          <button id="saveModal">Save</button>
        </div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("token");
      const authVerified = sessionStorage.getItem("authVerified");

      if (!token) {
        window.location.href = "/login";
      } else if (authVerified !== "true") {
        window.location.href = "/authenticator";
      }

      const tbody = document.getElementById("tbody");
      const meta = document.getElementById("meta");
      const errorBox = document.getElementById("errorBox");

      let currentPage = 1;
      let currentLimit = 50;
      let lastTotal = 0;

      const pageLabel = document.getElementById("pageLabel");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const limitSel = document.getElementById("limitSel");

      limitSel.value = String(currentLimit);

      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.style.display = "block";
      }

      function clearError() {
        errorBox.textContent = "";
        errorBox.style.display = "none";
      }

      function handleUnauthorized() {
        localStorage.removeItem("token");
        sessionStorage.removeItem("authVerified");
        window.location.href = "/login";
      }

      async function apiFetch(url, options = {}) {
        const res = await fetch(url, {
          ...options,
          headers: {
            ...(options.headers || {}),
            Authorization: "Bearer " + token,
          },
        });

        if (res.status === 401) {
          handleUnauthorized();
          return null;
        }

        const text = await res.text();
        let data = {};

        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          data = { message: text };
        }

        return { res, data };
      }

      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("token");
        sessionStorage.removeItem("authVerified");
        window.location.href = "/";
      });

      try {
        const payload = JSON.parse(atob(token.split(".")[1]));
        if (payload.role === "admin") {
          document.getElementById("usersBtn").style.display = "inline-block";
        }
      } catch (e) {}

      document.getElementById("usersBtn").addEventListener("click", () => {
        window.location.href = "/users";
      });

      function safe(v) {
        return (v ?? "").toString();
      }

      function renderRows(rows) {
        tbody.innerHTML = "";

        rows.forEach((r, index) => {
          const tr = document.createElement("tr");
          const rowNumber = ((currentPage - 1) * currentLimit) + index + 1;

          const name = r.name ?? r.full_name ?? "";
          const phone = r.phone ?? "";
          const state = r.state ?? "";
          const lga = r.lga ?? "";
          const ward = r.ward ?? "";
          const polling_unit = r.polling_unit ?? "";
          const pvc_vin = r.pvc_vin ?? "";
          const position = r.position ?? "";
          const age = r.age ?? "";
          const gender = r.gender ?? "";
          const support_group = r.support_group ?? "";

         tr.innerHTML = `
<td data-label="S/N">${rowNumber}</td>
<td data-label="Name">${safe(name)}</td>
<td data-label="Phone">${safe(r.phone)}</td>
<td data-label="State">${safe(r.state)}</td>
<td data-label="LGA">${safe(r.lga)}</td>
<td data-label="Ward">${safe(r.ward)}</td>
<td data-label="Polling Unit">${safe(r.polling_unit)}</td>
<td data-label="PVC/VIN">${safe(r.pvc_vin)}</td>
<td data-label="Position">${safe(r.position)}</td>
<td data-label="Age">${safe(r.age)}</td>
<td data-label="Gender">${safe(r.gender)}</td>
<td data-label="Support Group">${safe(r.support_group)}</td>
<td data-label="Actions">
<div class="actions">
<button class="btn-small btn-edit" data-action="edit" data-id="${r.id}">Edit</button>
<button class="btn-small btn-danger" data-action="del" data-id="${r.id}">Delete</button>
</div>
</td>
`;

          tr.dataset.record = JSON.stringify(r);
          tbody.appendChild(tr);
        });
      }

      async function loadRecords() {
        clearError();

        const state = document.getElementById("state").value.trim();
        const lga = document.getElementById("lga").value.trim();

        const params = new URLSearchParams();
        if (state) params.set("state", state);
        if (lga) params.set("lga", lga);

        params.set("page", String(currentPage));
        params.set("limit", String(currentLimit));

        const out = await apiFetch("/api/records?" + params.toString());
        if (!out) return;

        const { res, data } = out;

        if (!res.ok) {
          showError(data.message || "Failed to fetch records.");
          return;
        }

        lastTotal = Number(data.total || 0);
        const rows = data.data || [];
        const totalPages = Math.max(Math.ceil(lastTotal / currentLimit), 1);

        pageLabel.textContent = String(currentPage);
        prevBtn.disabled = currentPage <= 1;
        nextBtn.disabled = currentPage >= totalPages;

        meta.textContent = lastTotal
          ? `Total results: ${lastTotal} • Page ${currentPage} of ${totalPages}`
          : "No results found.";

        renderRows(rows);
      }

      document.getElementById("searchBtn").addEventListener("click", () => {
        currentPage = 1;
        loadRecords();
      });

      prevBtn.addEventListener("click", async () => {
        if (currentPage > 1) {
          currentPage--;
          await loadRecords();
        }
      });

      nextBtn.addEventListener("click", async () => {
        const totalPages = Math.max(Math.ceil(lastTotal / currentLimit), 1);
        if (currentPage < totalPages) {
          currentPage++;
          await loadRecords();
        }
      });

      limitSel.addEventListener("change", async () => {
        currentLimit = Number(limitSel.value);
        currentPage = 1;
        await loadRecords();
      });

      const modalBack = document.getElementById("modalBack");
      const modalTitle = document.getElementById("modalTitle");
      const saveModalBtn = document.getElementById("saveModal");

      const m_full_name = document.getElementById("m_full_name");
      const m_phone = document.getElementById("m_phone");
      const m_state = document.getElementById("m_state");
      const m_lga = document.getElementById("m_lga");
      const m_ward = document.getElementById("m_ward");
      const m_polling_unit = document.getElementById("m_polling_unit");
      const m_pvc_vin = document.getElementById("m_pvc_vin");
      const m_position = document.getElementById("m_position");
      const m_age = document.getElementById("m_age");
      const m_gender = document.getElementById("m_gender");
      const m_support_group = document.getElementById("m_support_group");

      let mode = "add";
      let editId = null;

      function openModal(newMode, record = null) {
        mode = newMode;
        clearError();

        if (mode === "add") {
          modalTitle.textContent = "Add Record";
          saveModalBtn.textContent = "Create";
          editId = null;

          m_full_name.value = "";
          m_phone.value = "";
          m_state.value = "";
          m_lga.value = "";
          m_ward.value = "";
          m_polling_unit.value = "";
          m_pvc_vin.value = "";
          m_position.value = "";
          m_age.value = "";
          m_gender.value = "";
          m_support_group.value = "";
        } else {
          modalTitle.textContent = "Edit Record";
          saveModalBtn.textContent = "Update";
          editId = record.id;

          m_full_name.value = record.full_name ?? record.name ?? "";
          m_phone.value = record.phone ?? "";
          m_state.value = record.state ?? "";
          m_lga.value = record.lga ?? "";
          m_ward.value = record.ward ?? "";
          m_polling_unit.value = record.polling_unit ?? "";
          m_pvc_vin.value = record.pvc_vin ?? "";
          m_position.value = record.position ?? "";
          m_age.value = record.age ?? "";
          m_gender.value = record.gender ?? "";
          m_support_group.value = record.support_group ?? "";
        }

        modalBack.style.display = "flex";
      }

      function closeModal() {
        modalBack.style.display = "none";
      }

      document.getElementById("addBtn").addEventListener("click", () => openModal("add"));
      document.getElementById("closeModal").addEventListener("click", closeModal);
      document.getElementById("cancelModal").addEventListener("click", closeModal);

      modalBack.addEventListener("click", (e) => {
        if (e.target === modalBack) closeModal();
      });

      saveModalBtn.addEventListener("click", async () => {
        clearError();

        const payload = {
          full_name: m_full_name.value.trim(),
          phone: m_phone.value.trim(),
          state: m_state.value.trim(),
          lga: m_lga.value.trim(),
          ward: m_ward.value.trim(),
          polling_unit: m_polling_unit.value.trim(),
          pvc_vin: m_pvc_vin.value.trim(),
          position: m_position.value.trim(),
          age: m_age.value.trim(),
          gender: m_gender.value.trim(),
          support_group: m_support_group.value.trim(),
        };

        const required = ["full_name", "phone", "state", "lga", "ward"];
        const missing = required.filter(k => !payload[k]);

        if (missing.length) {
          showError("Please fill: " + missing.join(", "));
          return;
        }

        let out;

        if (mode === "add") {
          out = await apiFetch("/api/records", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } else {
          out = await apiFetch("/api/records/" + editId, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        }

        if (!out) return;

        const { res, data } = out;

        if (!res.ok) {
          showError(data.message || "Request failed.");
          return;
        }

        closeModal();
        await loadRecords();
      });

      tbody.addEventListener("click", async (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;

        const action = btn.dataset.action;
        const id = btn.dataset.id;

        if (action === "edit") {
          const tr = btn.closest("tr");
          const record = JSON.parse(tr.dataset.record || "{}");
          openModal("edit", record);
          return;
        }

        if (action === "del") {
          const ok = confirm("Are you sure you want to delete this record?");
          if (!ok) return;

          clearError();
          const out = await apiFetch("/api/records/" + id, { method: "DELETE" });
          if (!out) return;

          const { res, data } = out;

          if (!res.ok) {
            showError(data.message || "Delete failed.");
            return;
          }

          await loadRecords();
        }
      });

      loadRecords();
    </script>
  </body>
</html>
